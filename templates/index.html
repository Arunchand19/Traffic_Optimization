<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffic Optimization System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .camera-feed {
            width: 100%;
            max-width: 800px;
            margin: 20px auto;
            border: 2px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
        }
        .camera-controls {
            margin: 20px 0;
            padding: 15px;
            background-color: #f8f9fa;
            border-radius: 8px;
        }
        .status-indicator {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }
        .status-active {
            background-color: #28a745;
        }
        .status-inactive {
            background-color: #dc3545;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <span class="navbar-brand mb-0 h1">Traffic Optimization System</span>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-8">
                <div class="camera-feed">
                    <img id="video-feed" src="" alt="Camera Feed" style="width: 100%;">
                </div>
            </div>
            <div class="col-md-4">
                <div class="camera-controls">
                    <h4>Camera Controls</h4>
                    <div class="mb-3">
                        <label for="camera-select" class="form-label">Select Camera</label>
                        <select class="form-select" id="camera-select">
                            <option value="">No camera selected</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="camera-source" class="form-label">Add New Camera</label>
                        <input type="text" class="form-control" id="camera-source" 
                               placeholder="Enter camera source (URL or device index)">
                    </div>
                    <button class="btn btn-primary" onclick="addCamera()">Add Camera</button>
                </div>

                <div class="mt-4">
                    <h4>System Status</h4>
                    <div id="status-list">
                        <!-- Status items will be added here dynamically -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Update camera list
        function updateCameraList() {
            fetch('/api/cameras')
                .then(response => response.json())
                .then(cameras => {
                    const select = document.getElementById('camera-select');
                    select.innerHTML = '<option value="">No camera selected</option>';
                    cameras.forEach(camera => {
                        const option = document.createElement('option');
                        option.value = camera;
                        option.textContent = `Camera ${camera}`;
                        select.appendChild(option);
                    });
                });
        }

        // Add new camera
        function addCamera() {
            const source = document.getElementById('camera-source').value;
            if (!source) {
                alert('Please enter a camera source');
                return;
            }

            const cameraId = `camera_${Date.now()}`;
            fetch(`/api/cameras/${cameraId}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ source: source }),
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    alert(data.error);
                } else {
                    updateCameraList();
                    document.getElementById('camera-source').value = '';
                }
            });
        }

        // Update video feed
        function updateVideoFeed() {
            const cameraId = document.getElementById('camera-select').value;
            const videoFeed = document.getElementById('video-feed');
            if (cameraId) {
                videoFeed.src = `/video_feed/${cameraId}`;
            } else {
                videoFeed.src = '';
            }
        }

        // Initialize
        document.getElementById('camera-select').addEventListener('change', updateVideoFeed);
        updateCameraList();

        // Update status periodically
        setInterval(() => {
            fetch('/api/cameras')
                .then(response => response.json())
                .then(cameras => {
                    const statusList = document.getElementById('status-list');
                    statusList.innerHTML = '';
                    cameras.forEach(camera => {
                        const status = document.createElement('div');
                        status.className = 'mb-2';
                        status.innerHTML = `
                            <span class="status-indicator status-active"></span>
                            Camera ${camera}
                            <button class="btn btn-sm btn-danger float-end" 
                                    onclick="removeCamera('${camera}')">Remove</button>
                        `;
                        statusList.appendChild(status);
                    });
                });
        }, 5000);

        // Remove camera
        function removeCamera(cameraId) {
            if (confirm(`Are you sure you want to remove camera ${cameraId}?`)) {
                fetch(`/api/cameras/${cameraId}`, {
                    method: 'DELETE',
                })
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        alert(data.error);
                    } else {
                        updateCameraList();
                        updateVideoFeed();
                    }
                });
            }
        }
    </script>
</body>
</html>
