<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Upload Images</title>
    <style>
        /* Full-screen flexbox centering */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f3f3f3;
        }
        .container {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 20px;
            border: 2px solid #ddd;
            border-radius: 10px;
            background-color: #fff;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        h2 {
            margin: 0;
            font-size: 24px;
        }
        form {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        input[type="file"] {
            margin: 5px 0;
        }
        input[type="submit"] {
            font-size: 16px;
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        input[type="submit"]:hover {
            background-color: #45a049;
        }
        img {
            width: 300px;
            height: 300px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Upload Images for Vehicle Detection</h2>
        <img src="https://cdn-icons-png.freepik.com/256/10024/10024501.png?semt=ais_hybrid" alt="Vehicle Detection Icon">
        <form action="/" method="post" enctype="multipart/form-data">
            <label>Road 1:</label>
            <input type="file" name="file1" accept="image/*">
            <label>Road 2:</label>
            <input type="file" name="file2" accept="image/*">
            <label>Road 3:</label>
            <input type="file" name="file3" accept="image/*">
            <label>Road 4:</label>
            <input type="file" name="file4" accept="image/*">
            <input type="submit" value="Upload Images">
        </form>
    </div>
</body>
</html>
