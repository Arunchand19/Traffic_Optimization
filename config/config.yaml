# Application Configuration
app:
  name: "Traffic Optimization System"
  debug: false
  host: "0.0.0.0"
  port: 5000

# Database Configuration
database:
  url: "postgresql://user:password@localhost:5432/traffic_db"
  pool_size: 20
  max_overflow: 10

# Redis Configuration
redis:
  host: "localhost"
  port: 6379
  db: 0

# YOLOv8 Model Configuration
model:
  weights: "data/models/yolov8x.pt"
  confidence_threshold: 0.5
  iou_threshold: 0.45
  classes:
    - "car"
    - "truck"
    - "bus"
    - "ambulance"
    - "fire_truck"
    - "police_car"

# Camera Configuration
cameras:
  max_workers: 4
  frame_buffer_size: 30
  processing_interval: 0.1  # seconds

# Accident Detection Configuration
accident_detection:
  motion_threshold: 0.8
  collision_threshold: 0.7
  alert_cooldown: 300  # seconds

# Emergency Services
emergency_services:
  notification_endpoint: "http://localhost:8000/api/notify"
  retry_attempts: 3
  retry_delay: 5  # seconds

# Logging Configuration
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/app.log" 